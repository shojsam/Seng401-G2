services:
  db:
    image: mysql:8.4
    container_name: greenwatch-db
    profiles:
      - local-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: green_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: greenwatch-backend
    environment:
      MYSQLHOST: ${MYSQLHOST}
      MYSQLPORT: ${MYSQLPORT}
      MYSQLUSER: ${MYSQLUSER}
      MYSQLPASSWORD: ${MYSQLPASSWORD}
      MYSQLDATABASE: ${MYSQLDATABASE}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: greenwatch-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data:
