services:
  db:
    image: mysql:8.4
    container_name: greenwatch-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: card_game_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: greenwatch-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: card_game_db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: greenwatch-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data:
